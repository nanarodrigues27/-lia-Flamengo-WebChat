<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Salesforce Chat</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,.15);
            text-align: center;
            max-width: 500px;
        }

        h1 {
            color: #0176d3;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .status {
            display: inline-block;
            background: #e3f2fd;
            color: #0176d3;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Teste do Salesforce Chat</h1>

        <p>
            Se tudo estiver configurado corretamente, o botão de chat aparecerá
            automaticamente no canto inferior direito da tela.
        </p>

        <div class="status">
            Aguardando carregamento...
        </div>
    </div>

    <script type="text/javascript">
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = "en_US";

                embeddedservice_bootstrap.init(
                    "00DHZ000009sBZB",
                    "ChatTest_DevGi",
                    "https://nacao--devgi.sandbox.my.site.com/ESWChatTestDevGi1783618225006",
                    {
                        scrt2URL: "https://nacao--devgi.sandbox.my.salesforce-scrt.com"
                    }
                );
            } catch (err) {
                console.error("Error loading Embedded Messaging:", err);
            }
        }
    </script>

    <script
        type="text/javascript"
        src="https://nacao--devgi.sandbox.my.site.com/ESWChatTestDevGi1783618225006/assets/js/bootstrap.min.js"
        onload="initEmbeddedMessaging()">
    </script>

</body>
</html>
